
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOC Incident Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>SOC Incident Dashboard</h1>
    <p>Cybersecurity Incident Monitoring System</p>
  </header>

  <main>
    <section class="controls">
      <input type="text" id="searchInput" placeholder="Search incidents...">
      <select id="severityFilter">
        <option value="All">All Severities</option>
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
        <option value="Critical">Critical</option>
      </select>
    </section>

    <section class="stats">
      <div class="card">
        <h2 id="totalIncidents">0</h2>
        <p>Total Incidents</p>
      </div>

      <div class="card">
        <h2 id="criticalIncidents">0</h2>
        <p>Critical Alerts</p>
      </div>
    </section>

    <section>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Severity</th>
            <th>Attack Type</th>
            <th>Source IP</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="incidentTable"></tbody>
      </table>
    </section>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
